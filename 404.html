<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Page not found | PAT-STUDIO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: white;
            color: black;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            transition: all 0.3s ease;
        }

        body.dark-theme {
            background: #121212;
            color: #e0e0e0;
        }

        .video-container {
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .error-title {
            font-size: 32px;
            color: #0088cc;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .error-text {
            font-size: 18px;
            color: #0088cc;
            margin-bottom: 30px;
            max-width: 600px;
            line-height: 1.6;
        }

        body.dark-theme .error-text {
            color: #66b3ff;
        }

        .home-link {
            display: inline-block;
            padding: 12px 30px;
            background: #0088cc;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
            transition: background 0.3s;
        }

        .home-link:hover {
            background: #006699;
        }

        @media (max-width: 768px) {
            .video-container {
                width: 250px;
                height: 250px;
            }

            .error-title {
                font-size: 24px;
            }

            .error-text {
                font-size: 16px;
                padding: 0 15px;
            }
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video autoplay muted loop playsinline>
            <source src="../image/DontKnowDUCK.mp4" type="video/mp4">
        </video>
    </div>

    <h1 class="error-title" data-ru="404 - Страница не найдена" data-en="404 - Page not found">404 - Страница не найдена</h1>

    <p class="error-text" data-ru="К сожалению, запрашиваемая страница не существует или была перемещена.<br>Возможно, вы ошиблись в адресе или страница была удалена."
       data-en="Unfortunately, the requested page does not exist or has been moved.<br>You may have entered the wrong address or the page has been deleted.">
        К сожалению, запрашиваемая страница не существует или была перемещена.<br>
        Возможно, вы ошиблись в адресе или страница была удалена.
    </p>

    <a href="/" class="home-link" data-ru="Вернуться на главную" data-en="Return to homepage">Вернуться на главную</a>

    <script>
        function toggleTheme(isDark) {
            const body = document.body;

            if (isDark) {
                body.classList.add('dark-theme');
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.remove('dark-theme');
                localStorage.setItem('theme', 'light');
            }
        }

        function changeLanguage(lang) {
            document.documentElement.lang = lang;

            if (lang === 'ru') {
                document.title = 'Страница не найдена | PAT-STUDIO';
            } else {
                document.title = 'Page not found | PAT-STUDIO';
            }

            document.querySelectorAll('[data-ru][data-en]').forEach(element => {
                element.textContent = element.getAttribute(`data-${lang}`);
            });

            localStorage.setItem('language', lang);
        }

        function loadSettings() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                toggleTheme(true);
            } else {
                toggleTheme(false);
            }

            const savedLang = localStorage.getItem('language') || 'ru';
            changeLanguage(savedLang);
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.querySelector('video').play().catch(e => console.log("Видео автовоспроизведение:", e));

            loadSettings();
        });
    </script>
</body>
</html>
